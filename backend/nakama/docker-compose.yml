services:
  postgres:
    image: postgres:15
    container_name: lila-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdbpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.22.0
    container_name: lila-nakama
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:localdbpassword@postgres:5432/nakama &&
        exec /nakama/nakama
        --name lila-nakama
        --config /nakama/data/local.yml
        --database.address postgres:localdbpassword@postgres:5432/nakama
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./build:/nakama/data/build
      - ./local.yml:/nakama/data/local.yml
    restart: unless-stopped

volumes:
  postgres_data: